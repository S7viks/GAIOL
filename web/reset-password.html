<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set new password - GAIOL</title>
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        .auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg, #0f0f12); color: var(--text, #e8e8ed); }
        .auth-card { background: var(--surface, #1a1a1f); padding: 2rem; border-radius: 12px; max-width: 400px; width: 100%; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.25rem; color: var(--muted, #888); }
        .form-group input { width: 100%; padding: 0.5rem; background: var(--bg); border: 1px solid var(--border, #2a2a32); border-radius: 6px; color: var(--text); }
        .btn-primary { background: var(--accent, #6366f1); color: #fff; border: none; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
        .message { margin-top: 1rem; font-size: 0.9rem; }
        .message.error { color: #f59e0b; }
        .message.success { color: #22c55e; }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <h1 style="margin-top:0;">Set new password</h1>
            <div id="noTokenMessage" style="display: none;">
                <p>Open the password reset link from your email to set a new password on this page.</p>
                <a href="/login">Back to sign in</a>
            </div>
            <div id="formContainer" style="display: none;">
                <form id="resetForm">
                    <div class="form-group">
                        <label for="newPassword">New password</label>
                        <input type="password" id="newPassword" required minlength="6" autocomplete="new-password">
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Confirm password</label>
                        <input type="password" id="confirmPassword" required minlength="6" autocomplete="new-password">
                    </div>
                    <button type="submit" class="btn-primary" id="submitBtn">Update password</button>
                </form>
                <p id="formMessage" class="message" style="display: none;"></p>
            </div>
        </div>
    </div>
    <script>
        (function () {
            function getHashParams() {
                var hash = window.location.hash.slice(1);
                var params = {};
                hash.split('&').forEach(function (p) {
                    var kv = p.split('=');
                    if (kv.length === 2) params[decodeURIComponent(kv[0])] = decodeURIComponent(kv[1]);
                });
                return params;
            }
            var params = getHashParams();
            var accessToken = params.access_token || params['access_token'];
            var noTokenEl = document.getElementById('noTokenMessage');
            var formEl = document.getElementById('formContainer');
            var form = document.getElementById('resetForm');
            var msgEl = document.getElementById('formMessage');
            var submitBtn = document.getElementById('submitBtn');
            if (!accessToken) {
                noTokenEl.style.display = 'block';
                return;
            }
            formEl.style.display = 'block';
            form.addEventListener('submit', function (e) {
                e.preventDefault();
                var newP = document.getElementById('newPassword').value;
                var confirmP = document.getElementById('confirmPassword').value;
                if (newP !== confirmP) {
                    msgEl.style.display = 'block';
                    msgEl.textContent = 'Passwords do not match';
                    msgEl.className = 'message error';
                    return;
                }
                if (newP.length < 6) {
                    msgEl.style.display = 'block';
                    msgEl.textContent = 'Password must be at least 6 characters';
                    msgEl.className = 'message error';
                    return;
                }
                submitBtn.disabled = true;
                msgEl.style.display = 'none';
                fetch('/api/auth/update-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + accessToken
                    },
                    body: JSON.stringify({ password: newP })
                }).then(function (r) {
                    return r.json().then(function (data) {
                        if (r.ok && data.success) {
                            msgEl.style.display = 'block';
                            msgEl.textContent = 'Password updated. Redirecting to sign in...';
                            msgEl.className = 'message success';
                            setTimeout(function () { window.location.href = '/login'; }, 1500);
                        } else {
                            msgEl.style.display = 'block';
                            msgEl.textContent = data.error || data.message || 'Update failed';
                            msgEl.className = 'message error';
                            submitBtn.disabled = false;
                        }
                    }).catch(function () {
                        msgEl.style.display = 'block';
                        msgEl.textContent = r.statusText || 'Update failed';
                        msgEl.className = 'message error';
                        submitBtn.disabled = false;
                    });
                }).catch(function (err) {
                    msgEl.style.display = 'block';
                    msgEl.textContent = err.message || 'Network error';
                    msgEl.className = 'message error';
                    submitBtn.disabled = false;
                });
            });
        })();
    </script>
</body>
</html>
