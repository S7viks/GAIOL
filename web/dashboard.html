<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - GAIOL</title>
  <style>
    :root { --bg: #0f0f12; --surface: #1a1a1f; --text: #e8e8ed; --muted: #888; --accent: #6366f1; --border: #2a2a32; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .layout { display: flex; min-height: 100vh; }
    .sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border); padding: 1rem 0; flex-shrink: 0; }
    .sidebar a { display: block; padding: 0.5rem 1.25rem; color: var(--text); text-decoration: none; }
    .sidebar a:hover, .sidebar a.active { background: rgba(99,102,241,0.15); color: var(--accent); }
    .main { flex: 1; padding: 1.5rem 2rem; overflow: auto; }
    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 0.5rem; }
    .user-menu { position: relative; }
    .user-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 0.4rem 0.8rem; border-radius: 6px; cursor: pointer; }
    .user-dropdown { position: absolute; right: 0; top: 100%; margin-top: 4px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; min-width: 140px; z-index: 10; display: none; }
    .user-dropdown.show { display: block; }
    .user-dropdown a { display: block; padding: 0.5rem 1rem; color: var(--text); text-decoration: none; }
    .user-dropdown a:hover { background: rgba(99,102,241,0.15); }
    .nav-toggle { display: none; background: none; border: none; color: var(--text); font-size: 1.5rem; cursor: pointer; padding: 0.25rem; }
    .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; }
    .card .label { font-size: 0.85rem; color: var(--muted); }
    .card .value { font-size: 1.5rem; font-weight: 600; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-weight: 500; font-size: 0.85rem; }
    .btn { display: inline-block; background: var(--accent); color: #fff; border: none; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; text-decoration: none; font-size: 0.9rem; }
    .btn:hover { opacity: 0.9; }
    .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .btn-danger { background: #dc2626; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; margin-bottom: 0.25rem; color: var(--muted); font-size: 0.9rem; }
    .form-group input { width: 100%; max-width: 400px; padding: 0.5rem; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--text); }
    .page { display: none; }
    .page.active { display: block; }
    .empty { color: var(--muted); padding: 2rem; text-align: center; }
    .key-reveal { background: var(--surface); padding: 1rem; border-radius: 8px; margin: 1rem 0; font-family: monospace; word-break: break-all; }
    .key-warning { color: #f59e0b; font-size: 0.9rem; margin-top: 0.5rem; }
    @media (max-width: 768px) {
      .nav-toggle { display: block; }
      .sidebar { position: fixed; left: 0; top: 0; bottom: 0; z-index: 20; transform: translateX(-100%); transition: transform 0.2s; }
      .sidebar.open { transform: translateX(0); }
      .main { padding: 1rem; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <a href="/dashboard" class="nav-link" data-page="home">Home</a>
      <a href="/dashboard/usage" class="nav-link" data-page="usage">Usage</a>
      <a href="/dashboard/billing" class="nav-link" data-page="billing">Billing</a>
      <a href="/dashboard/activity" class="nav-link" data-page="activity">Activity</a>
      <a href="/dashboard/models" class="nav-link" data-page="models">Models</a>
      <a href="/dashboard/api-keys" class="nav-link" data-page="api-keys">API keys</a>
      <a href="/dashboard/settings" class="nav-link" data-page="settings">Settings</a>
    </aside>
    <main class="main">
      <div class="topbar">
        <h1 style="margin:0;font-size:1.25rem;" id="pageTitle">Dashboard</h1>
        <div style="display:flex;align-items:center;gap:0.5rem;">
          <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">&#9776;</button>
          <div class="user-menu">
            <button class="user-btn" id="userBtn"><span id="userEmail">Account</span> &#9662;</button>
            <div class="user-dropdown" id="userDropdown">
              <a href="/dashboard/settings">Settings</a>
              <a href="#" id="logoutLink">Logout</a>
            </div>
          </div>
        </div>
      </div>
      <div id="dashboardContent"></div>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
